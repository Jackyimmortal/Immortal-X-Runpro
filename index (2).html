  overflow: hidden;
}

/* Glow Title */
h1 {
  margin-top: 90px;
  font-size: 32px;
  letter-spacing: 4px;
  color: white;

.btn {

  margin: 15px auto;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  color: white;
  text-decoration: none;

.btn:hover {

  box-shadow: 0 0 15px red;

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/3ZQ3Z9m.png');
  opacity: 0.08;
  animation: move 20s linear infinite;
}

@keyframes move {
  from {background-position: 0 0;}
  to {background-position: 1000px 1000px;}
}
