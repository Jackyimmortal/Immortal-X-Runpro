<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Immortal-X-Runpro</title>

  <!-- 🔥 ใช้ไอคอน -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      text-align: center;
      color: white;

      background:
        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
        url("<img class="logo" src="images/logo.png">") no-repeat center;

      background-size: 300px;
      background-color: black;
    }

    /* 🔥 โลโก้ขยับ + กระพริบ */
    .logo {
      width: 300px;
      margin-top: 100px;
      animation: glow 2s infinite alternate, float 3s ease-in-out infinite;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 5px white);
      }
      to {
        filter: drop-shadow(0 0 25px red);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    /* ปุ่ม */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      width: 220px;
      margin: 20px auto;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      color: white;
      text-decoration: none;
    }

    .btn:hover {
      background: red;
      box-shadow: 0 0 15px red;
      transform: scale(1.05);
    }

    /* 🔥 ไอคอน */
    .btn i {
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- โลโก้ -->
  <img src="images/logo.png" class="logo">

  <!-- ปุ่ม -->
  <a href="#" class="btn">
    <i class="fa-solid fa-play"></i>
    เริ่มใช้งาน
  </a>

  <!-- 🔥 Discord -->
  <a href="https://discord.gg/p34WpBu7" class="btn" target="_blank">
    <i class="fa-brands fa-discord"></i>
    เข้า Discord
  </a>

</body>
</html>
